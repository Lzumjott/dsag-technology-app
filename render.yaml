services:
  - type: web
    name: dsag-technology-app
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install && pnpm build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOSTNAME
        value: 0.0.0.0
    healthCheckPath: /
